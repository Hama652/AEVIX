project:
  name: AEVIX
  slug: aevix
  version: 0.1.0

runtime:
  profile: development
  seed: 42

paths:
  root: .
  artifacts: artifacts
  checkpoints: checkpoints
  logs: logs

logging:
  logger_name: aevix
  level: INFO
  console: true
  file: true
  file_path: logs/aevix.log
  rotation:
    max_bytes: 10485760
    backup_count: 5
  format: "%(asctime)s %(levelname)s %(name)s %(message)s"
  date_format: "%Y-%m-%d %H:%M:%S"
